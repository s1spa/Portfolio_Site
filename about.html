<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Про мене - Ілля Авдосьєв</title>
    
    <!-- CSS Files -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/animations.css">
</head>

<body data-theme="dark">
    <header>
        <nav>
            <a href="index.html" class="logo">IA</a>
            <ul class="nav-links">
                <li><a href="index.html" data-i18n="nav.home">Головна</a></li>
                <li><a href="projects.html" data-i18n="nav.projects">Проєкти</a></li>
                <li><a href="about.html" class="active" data-i18n="nav.about">Про мене</a></li>
            </ul>
            <div class="controls">
                <button class="theme-toggle" id="theme-toggle">
                    <span id="theme-icon">🌞</span>
                </button>
                <select class="lang-switch" id="lang-switch">
                    <option value="uk">🇺🇦 UA</option>
                    <option value="en" selected>🇬🇧 EN</option>
                    <option value="pl">🇵🇱 PL</option>
                    <option value="de">🇩🇪 DE</option>
                </select>
            </div>
        </nav>
    </header>

    <main>
        <div class="container" id="main-content">
            <div class="loading" data-i18n="aboutPage.loading">Завантаження...</div>
        </div>
    </main>

    <footer>
        <p>&copy; 2025 <span id="footer-name">Ілля Авдосьєв</span>. <span data-i18n="footer.rights">Усі права
                захищено.</span></p>
    </footer>

    <script src="js/i18n.js"></script>
    <script src="js/theme.js"></script>
    <script>
        // Default data
        const DEFAULT_ABOUT = {
            profile: {
                name: { uk: "Ілля Авдосьєв", en: "Illia Avdosiev" },
                age: 20,
                avatar: "",
                bio: {
                    uk: ["Інформація про профіль скоро з'явиться."],
                    en: ["Profile information coming soon."]
                }
            }
        };

        // Helper function to get the correct icon path
        function getAboutIconPath(iconName) {
            // Icons specific to the 'About' page are in a subfolder
            const aboutSpecificIcons = ['code', 'book', 'target', 'email', 'telegram', 'linkedin', 'github'];
            
            if (aboutSpecificIcons.includes(iconName)) {
                return `images/icons/about/${iconName}.svg`;
            }
            
            // Shared icons (like 'game', 'folder', 'github') are in the main 'icons' folder
            return `images/icons/${iconName}.svg`;
        }

        // Рендеринг сторінки "Про мене"
        async function renderAboutPage() {
            const currentLang = getCurrentLanguage();
            const container = document.getElementById('main-content');

            try {
                const response = await fetch('data/about.json');
                const aboutData = response.ok ? await response.json() : DEFAULT_ABOUT;

                if (!aboutData || !aboutData.profile) {
                    container.innerHTML = `
                        <div class="no-data">
                            <h2 data-i18n="aboutPage.noData">${t('aboutPage.noData')}</h2>
                            <p>Дані профілю будуть доступні після експорту з адмін-панелі</p>
                        </div>
                    `;
                    return;
                }

                const data = aboutData;
                const nameParts = (data.profile.name[currentLang] || data.profile.name.uk).split(' ');
                const initials = nameParts.map(n => n[0]).join('');

                container.innerHTML = `
                    <section class="about-section">
                        <div class="about-content reveal">
                            <h1 data-i18n="aboutPage.title">${t('aboutPage.title')}</h1>
                            <div class="about-text">
                                ${(data.profile.bio[currentLang] || data.profile.bio.uk).map(paragraph => `
                                    <p>${paragraph.replace(/(C#|\.NET|ООП|Unity|ZeroTip)/g, '<span class="highlight">$1</span>')}</p>
                                `).join('')}
                            </div>
                        </div>
                        <div class="about-avatar">
                            <div class="avatar-container reveal" data-delay="1">
                                <div class="avatar-inner">
                                    ${data.profile.avatar ?
                        `<img src="${data.profile.avatar}" alt="${data.profile.name[currentLang] || data.profile.name.uk}">` :
                        `<div class="avatar-placeholder">${initials}</div>`
                    }
                                </div>
                            </div>
                        </div>
                    </section>

                    ${data.skills ? `
                    <section class="skills-section">
                        <h2 class="section-title reveal" data-i18n="aboutPage.skills">${t('aboutPage.skills')}</h2>
                        <div class="skills-grid">
                            ${Object.values(data.skills).map((category, i) => `
                                <div class="skill-category reveal" data-delay="${i + 1}">
                                    <div class="skill-header">
                                        <div class="skill-icon-box">
                                            <span class="icon category-icon" style="-webkit-mask-image: url(${getAboutIconPath(category.icon || 'code')}); mask-image: url(${getAboutIconPath(category.icon || 'code')});"></span>
                                        </div>
                                        <h3>${category.title[currentLang] || category.title.uk}</h3>
                                    </div>
                                    <div class="skill-tags">
                                        ${category.items.map(item => `<span class="skill-tag">${item}</span>`).join('')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </section>
                    ` : ''}

                    ${data.education && data.education.length > 0 ? `
                    <section class="experience-section">
                        <h2 class="section-title reveal" data-i18n="aboutPage.education">${t('aboutPage.education')}</h2>
                        <div class="timeline">
                            ${data.education.map((item, i) => `
                                <div class="timeline-item reveal" data-delay="${i + 1}">
                                    <div class="timeline-icon-wrap">
                                        <span class="icon" style="-webkit-mask-image: url(${getAboutIconPath(item.icon || 'book')}); mask-image: url(${getAboutIconPath(item.icon || 'book')});"></span>
                                    </div>
                                    <div class="timeline-body">
                                        <div class="timeline-meta">
                                            <h3 class="timeline-title">${item.title[currentLang] || item.title.uk}</h3>
                                            <span class="timeline-year-badge">${item.year}</span>
                                        </div>
                                        <p class="timeline-desc">${item.description[currentLang] || item.description.uk}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </section>
                    ` : ''}

                    ${data.goals ? `
                    <section class="goals-section">
                        <h2 class="section-title reveal" data-i18n="aboutPage.goals">${t('aboutPage.goals')}</h2>
                        <div class="goals-list">
                            ${Object.values(data.goals).map((goal, i) => `
                                <div class="goal-item reveal" data-delay="${i + 1}">
                                    <div class="goal-icon"><span class="icon" style="-webkit-mask-image: url(${getAboutIconPath(goal.icon || 'target')}); mask-image: url(${getAboutIconPath(goal.icon || 'target')});"></span></div>
                                    <div class="goal-content">
                                        <p><strong>${goal.title[currentLang] || goal.title.en}:</strong> ${goal.description[currentLang] || goal.description.uk}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </section>
                    ` : ''}

                    ${data.contacts ? `
                    <section class="contact-section">
                        <h2 class="contact-title reveal" data-i18n="aboutPage.contacts">${t('aboutPage.contacts')}</h2>
                        <p class="contact-subtitle reveal" data-delay="1" data-i18n="aboutPage.contactSubtitle">${t('aboutPage.contactSubtitle')}</p>
                        <div class="contact-links reveal" data-delay="2">
                            ${data.contacts.email ? `<a href="mailto:${data.contacts.email}" class="contact-link"><span class="icon contact-icon" style="-webkit-mask-image: url(${getAboutIconPath('email')}); mask-image: url(${getAboutIconPath('email')});"></span> ${data.contacts.email}</a>` : ''}
                            ${data.contacts.telegram ? `<a href="https://t.me/${data.contacts.telegram.replace('@', '')}" class="contact-link" target="_blank"><span class="icon contact-icon" style="-webkit-mask-image: url(${getAboutIconPath('telegram')}); mask-image: url(${getAboutIconPath('telegram')});"></span> ${data.contacts.telegram}</a>` : ''}
                            ${data.contacts.github ? `<a href="${data.contacts.github}" class="contact-link" target="_blank"><span class="icon contact-icon" style="-webkit-mask-image: url(${getAboutIconPath('github')}); mask-image: url(${getAboutIconPath('github')});"></span> GitHub</a>` : ''}
                            ${data.contacts.linkedin ? `<a href="${data.contacts.linkedin}" class="contact-link" target="_blank"><span class="icon contact-icon" style="-webkit-mask-image: url(${getAboutIconPath('linkedin')}); mask-image: url(${getAboutIconPath('linkedin')});"></span> LinkedIn</a>` : ''}
                        </div>
                    </section>
                    ` : ''}
                `;

                document.getElementById('footer-name').textContent = data.profile.name[currentLang] || data.profile.name.uk;
                setupScrollReveal();
            } catch (error) {
                container.innerHTML = `
                    <div class="no-data">
                        <h2>Помилка завантаження</h2>
                        <p>Дані будуть доступні після експорту <code>about.json</code> у папку <code>data/</code></p>
                    </div>
                `;
            }
        }

        function setupScrollReveal() {
            const els = document.querySelectorAll('.reveal:not(.in-view)');
            if (!('IntersectionObserver' in window)) {
                els.forEach(el => el.classList.add('in-view'));
                return;
            }
            const io = new IntersectionObserver(entries => {
                entries.forEach(e => {
                    if (e.isIntersecting) {
                        e.target.classList.add('in-view');
                        io.unobserve(e.target);
                    }
                });
            }, { rootMargin: '0px 0px -4% 0px', threshold: 0 });
            els.forEach(el => io.observe(el));
        }

        // Ініціалізація
        window.addEventListener('DOMContentLoaded', () => {
            renderAboutPage();

            // Обробники подій для контролів
            document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
            document.getElementById('lang-switch').addEventListener('change', (e) => changeLanguage(e.target.value));
        });
    </script>
</body>

</html>
