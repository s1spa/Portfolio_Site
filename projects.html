<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мої проєкти - Ілля Авдосьєв</title>
    
    <!-- CSS Files -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/animations.css">
</head>

<body data-theme="dark">
    <header>
        <nav>
            <a href="index.html" class="logo">IA</a>
            <ul class="nav-links">
                <li><a href="index.html" data-i18n="nav.home">Головна</a></li>
                <li><a href="projects.html" class="active" data-i18n="nav.projects">Проєкти</a></li>
                <li><a href="about.html" data-i18n="nav.about">Про мене</a></li>
            </ul>
            <div class="controls">
                <button class="theme-toggle" id="theme-toggle">
                    <span id="theme-icon">🌞</span>
                </button>
                <select class="lang-switch" id="lang-switch">
                    <option value="uk">🇺🇦 UA</option>
                    <option value="en" selected>🇬🇧 EN</option>
                    <option value="pl">🇵🇱 PL</option>
                    <option value="de">🇩🇪 DE</option>
                </select>
            </div>
        </nav>
    </header>

    <main>
        <div class="container">
            <div class="page-header">
                <h1 class="page-title" data-i18n="projectsPage.title">Мої проєкти</h1>
                <p class="page-subtitle" data-i18n="projectsPage.subtitle">Фільтруй за типом (Ігри/Застосунки),
                    технологіями (Unity, C#, Алгоритми) або просто шукай за назвою.</p>
            </div>

            <div class="filters">
                <div class="search-box">
                    <span class="icon search-icon" style="-webkit-mask-image: url(images/icons/search.svg); mask-image: url(images/icons/search.svg);"></span>
                    <input type="text" id="search-input" data-i18n-placeholder="projectsPage.search" placeholder="Пошук за назвою, описом або тегом...">
                </div>
                <div class="filter-divider"></div>
                <div class="filter-buttons" id="filter-buttons">
                    <button class="filter-btn active" data-filter="all" data-i18n="projectsPage.all">Всі</button>
                    <button class="filter-btn" data-filter="games" data-i18n="projectsPage.games">Ігри</button>
                    <button class="filter-btn" data-filter="apps" data-i18n="projectsPage.apps">Застосунки</button>
                </div>
            </div>

            <div class="projects-grid" id="projects-grid"></div>
        </div>
    </main>

    <footer>
        <p>&copy; 2025 <span id="footer-name">Ілля Авдосьєв</span>. <span data-i18n="footer.rights">Усі права
                захищено.</span></p>
    </footer>

    <!-- JavaScript -->
    <script src="js/i18n.js"></script>
    <script src="js/theme.js"></script>
    <script>
        // Default data
        const DEFAULT_PROJECTS = {
            projects: []
        };

        const DEFAULT_PROFILE = {
            profile: {
                name: { uk: "Ілля Авдосьєв", en: "Illia Avdosiev" }
            }
        };

        let currentFilter = 'all';
        let currentSearch = '';
        let allProjects = [];

        function setupScrollReveal() {
            const els = document.querySelectorAll('.reveal:not(.in-view)');
            if (!('IntersectionObserver' in window)) {
                els.forEach(el => el.classList.add('in-view'));
                return;
            }
            const io = new IntersectionObserver(entries => {
                entries.forEach(e => {
                    if (e.isIntersecting) {
                        e.target.classList.add('in-view');
                        io.unobserve(e.target);
                    }
                });
            }, { rootMargin: '0px 0px 0px 0px', threshold: 0 });
            els.forEach(el => io.observe(el));
        }

        // Завантаження проєктів з JSON
        async function loadProjectsData() {
            try {
                const response = await fetch('data/projects.json');
                if (response.ok) {
                    const data = await response.json();
                    return data;
                }
            } catch (error) {
            }

            return DEFAULT_PROJECTS;
        }

        // Рендеринг проєктів
        async function renderProjects() {
            const container = document.getElementById('projects-grid');
            const currentLang = getCurrentLanguage();

            const projectsData = await loadProjectsData();
            allProjects = projectsData.projects || [];

            if (allProjects.length === 0) {
                container.innerHTML = `
                    <div class="no-results">
                        <div class="no-results-icon"><span class="icon" style="width: 48px; height: 48px; -webkit-mask-image: url(images/icons/folder.svg); mask-image: url(images/icons/folder.svg);"></span></div>
                        <h3 data-i18n="projectsPage.noProjects">${t('projectsPage.noProjects')}</h3>
                        <p>Проєкти скоро з'являться. Додайте їх через адмін-панель локально та експортуйте JSON файли.</p>
                    </div>
                `;
                return;
            }

            let filteredProjects = allProjects;

            // Фільтр по категорії
            if (currentFilter !== 'all') {
                filteredProjects = filteredProjects.filter(p => p.category === currentFilter);
            }

            // Фільтр по пошуку
            if (currentSearch) {
                filteredProjects = filteredProjects.filter(p =>
                    (p.title[currentLang] || p.title.uk).toLowerCase().includes(currentSearch.toLowerCase()) ||
                    (p.description[currentLang] || p.description.uk).toLowerCase().includes(currentSearch.toLowerCase()) ||
                    p.technologies.some(tech => tech.toLowerCase().includes(currentSearch.toLowerCase()))
                );
            }

            if (filteredProjects.length === 0) {
                container.innerHTML = `
                    <div class="no-results">
                        <div class="no-results-icon"><span class="icon" style="width: 48px; height: 48px; -webkit-mask-image: url(images/icons/search.svg); mask-image: url(images/icons/search.svg);"></span></div>
                        <h3 data-i18n="projectsPage.noResults">${t('projectsPage.noResults')}</h3>
                        <p data-i18n="projectsPage.noResultsText">${t('projectsPage.noResultsText')}</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filteredProjects.map((project, index) => `
                <div class="project-card reveal" data-project-id="${project.id}" data-delay="${(index % 3) + 1}" style="cursor: pointer;">
                    <div class="project-image">
                        ${project.mainImage ?
                            `<img src="${project.mainImage}" alt="${project.title[currentLang] || project.title.uk}" loading="lazy">` :
                            `<div class="project-image-placeholder"><span class="icon" style="width: 48px; height: 48px; -webkit-mask-image: url(images/icons/${project.icon || 'folder'}.svg); mask-image: url(images/icons/${project.icon || 'folder'}.svg);"></span></div>`
                        }
                        ${project.status ? `<div class="project-status" data-status="${project.status}">${t('common.' + project.status)}</div>` : ''}
                    </div>
                    <div class="project-content">
                        <h3 class="project-title">${project.title[currentLang] || project.title.uk}</h3>
                        <p class="project-description">${project.shortDescription ? (project.shortDescription[currentLang] || project.shortDescription.uk) : ''}</p>
                        <div class="project-tags">
                            ${project.technologies.map(tech => `<span class="tag">${tech}</span>`).join('')}
                        </div>
                        ${project.github || project.download ? `
                            <div class="project-links">
                                ${project.github ? `<a href="${project.github}" class="project-link" target="_blank"><span class="icon link-icon" style="-webkit-mask-image: url(images/icons/github.svg); mask-image: url(images/icons/github.svg);"></span> <span data-i18n="projectsPage.github">${t('projectsPage.github')}</span></a>` : ''}
                                ${project.download ? `<a href="${project.download}" class="project-link" target="_blank"><span class="icon link-icon" style="-webkit-mask-image: url(images/icons/download.svg); mask-image: url(images/icons/download.svg);"></span> Download</a>` : ''}
                            </div>
                        ` : ''}
                    </div>
                </div>
            `).join('');

            addEventListenersToCards();
            setupScrollReveal();
        }

        // Встановити фільтр

        // Фільтрувати проєкти за пошуком
        function filterProjects() {
            currentSearch = document.getElementById('search-input').value;
            renderProjects();
        }

        function addEventListenersToCards() {
            document.querySelectorAll('.project-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    // Не переходити, якщо клікнули на посилання всередині картки
                    if (e.target.closest('.project-link')) {
                        return;
                    }
                    window.location.href = `project-details.html?id=${card.dataset.projectId}`;
                });
            });
        }

        function setupFilters() {
            const filterButtons = document.getElementById('filter-buttons');
            filterButtons.addEventListener('click', (e) => {
                if (e.target.classList.contains('filter-btn')) {
                    currentFilter = e.target.dataset.filter;
                    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                    e.target.classList.add('active');
                    renderProjects();
                }
            });
        }

        // Завантаження імені профілю
        async function loadProfileName() {
            try {
                const response = await fetch('data/about.json');
                const aboutData = response.ok ? await response.json() : DEFAULT_PROFILE;
                
                if (aboutData && aboutData.profile) {
                    const currentLang = getCurrentLanguage();
                    const name = aboutData.profile.name[currentLang] || aboutData.profile.name.uk;
                    document.getElementById('footer-name').textContent = name;
                }
            } catch (error) {
            }
        }

        // Ініціалізація
        window.addEventListener('DOMContentLoaded', () => {
            renderProjects();
            loadProfileName();
            setupFilters();

            // Обробники подій для контролів
            document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
            document.getElementById('lang-switch').addEventListener('change', (e) => changeLanguage(e.target.value));
            document.getElementById('search-input').addEventListener('input', filterProjects);
        });
    </script>
</body>

</html>
